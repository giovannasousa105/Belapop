name: Admin Smoke Manual

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "URL alvo opcional para o smoke admin"
        required: false
        type: string

concurrency:
  group: admin-smoke-manual-${{ github.event.inputs.base_url || vars.BELAPOP_BASE_URL || 'https://belapopoficial.com.br' }}
  cancel-in-progress: false

jobs:
  smoke-admin-surfaces:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SMOKE_ADMIN_BASE_URL: ${{ github.event.inputs.base_url || vars.BELAPOP_BASE_URL || 'https://belapopoficial.com.br' }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        shell: bash
        run: |
          missing=0
          for name in NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Run admin smoke surfaces
        run: npm run smoke:admin:surfaces
