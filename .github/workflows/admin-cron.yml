name: Admin Cron

on:
  schedule:
    - cron: "5 0 * * *"      # rollup diário 00:05 UTC
    - cron: "*/15 * * * *"   # SLA notify a cada 15 min
  workflow_dispatch:

env:
  BASE_URL: http://localhost:3000 # ajuste se usar domínio público
  SERVICE_TOKEN: ${{ secrets.SERVICE_TOKEN }} # opcional para auth

jobs:
  rollup:
    if: github.event.schedule == '5 0 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Rollup metrics_daily
        run: |
          curl -X POST "$BASE_URL/api/admin/metrics/rollup" \
            -H "Content-Type: application/json" \
            ${SERVICE_TOKEN:+-H "Authorization: Bearer $SERVICE_TOKEN"}

  sla_notify:
    if: github.event.schedule == '*/15 * * * *'
    runs-on: ubuntu-latest
    steps:
      - name: SLA notify
        run: |
          curl -X POST "$BASE_URL/api/admin/sla/notify" \
            -H "Content-Type: application/json" \
            ${SERVICE_TOKEN:+-H "Authorization: Bearer $SERVICE_TOKEN"}
