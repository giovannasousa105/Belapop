name: Admin Cron

on:
  schedule:
    - cron: "5 0 * * *"      # rollup diario 00:05 UTC
    - cron: "*/15 * * * *"   # SLA notify a cada 15 min
  workflow_dispatch:
    inputs:
      base_url:
        description: "URL alvo opcional para executar o cron"
        required: false
        type: string

env:
  BASE_URL: ${{ github.event.inputs.base_url || vars.BELAPOP_BASE_URL || 'https://belapopsite-git-staging-belapop.vercel.app' }}
  SERVICE_TOKEN: ${{ secrets.SERVICE_TOKEN }} # opcional para auth

jobs:
  rollup:
    if: github.event.schedule == '5 0 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Rollup metrics_daily
        run: |
          curl -X POST "$BASE_URL/api/admin/metrics/rollup" \
            -H "Content-Type: application/json" \
            ${SERVICE_TOKEN:+-H "Authorization: Bearer $SERVICE_TOKEN"}

  sla_notify:
    if: github.event.schedule == '*/15 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: SLA notify
        run: |
          curl -X POST "$BASE_URL/api/admin/sla/notify" \
            -H "Content-Type: application/json" \
            ${SERVICE_TOKEN:+-H "Authorization: Bearer $SERVICE_TOKEN"}
