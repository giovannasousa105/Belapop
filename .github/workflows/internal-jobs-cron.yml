name: Internal Jobs Cron

on:
  schedule:
    - cron: "*/5 * * * *"    # notification outbox processor
    - cron: "*/15 * * * *"   # support SLA escalation
    - cron: "*/10 * * * *"   # reverse logistics + exception SLA
    - cron: "17 * * * *"     # SRE maturity foundations (on-call/error-budget/DR calendar)
    - cron: "12 * * * *"     # antifraud risk + holdbacks refresh
    - cron: "20 3 * * *"     # consolidated antifraud + T+1 reconciliation
    - cron: "*/2 * * * *"    # ranking near-real-time queue
  workflow_dispatch:
    inputs:
      base_url:
        description: "URL alvo opcional para executar jobs internos"
        required: false
        type: string
      outbox_limit:
        description: "Limite do worker de outbox"
        required: false
        default: "200"
        type: string
      sla_limit:
        description: "Limite do worker de SLA"
        required: false
        default: "250"
        type: string
      reverse_limit:
        description: "Limite do worker de logistica reversa"
        required: false
        default: "300"
        type: string
      sre_limit:
        description: "Limite para envio de alertas SRE/DR"
        required: false
        default: "250"
        type: string
      ranking_limit:
        description: "Limite da fila de ranking realtime"
        required: false
        default: "200"
        type: string
      risk_limit:
        description: "Limite do worker de risco/holdback"
        required: false
        default: "500"
        type: string
      recon_limit:
        description: "Limite da reconciliacao T+1"
        required: false
        default: "200"
        type: string
      recon_date:
        description: "Data da reconciliacao (YYYY-MM-DD). Vazio = ontem."
        required: false
        type: string
      recon_provider:
        description: "Provider opcional (ex: pagarme, stripe)."
        required: false
        type: string
      risk_window_days:
        description: "Janela de risco antifraude em dias."
        required: false
        default: "30"
        type: string
      critical_delta_cents:
        description: "Threshold critico de delta por provider em cents."
        required: false
        default: "10000"
        type: string
      oncall_days_ahead:
        description: "Dias de plantao a manter no calendario"
        required: false
        default: "21"
        type: string
      budget_window_days:
        description: "Janela de erro budget (dias)"
        required: false
        default: "30"
        type: string
      dr_months_ahead:
        description: "Meses a frente no calendario de DR"
        required: false
        default: "6"
        type: string
      dr_day_of_month:
        description: "Dia fixo do mes para drill de DR (1-28)"
        required: false
        default: "10"
        type: string
      dr_grace_days:
        description: "Dias de tolerancia antes de marcar DR como missed"
        required: false
        default: "3"
        type: string
      incident_ack_minutes:
        description: "SLA de ACK de incidente em minutos"
        required: false
        default: "10"
        type: string
      oncall_coverage_days_ahead:
        description: "Dias de cobertura de plantao para validar alerta"
        required: false
        default: "2"
        type: string
      dr_reminder_days_ahead:
        description: "Dias para alerta preventivo de DR game day"
        required: false
        default: "7"
        type: string
      dr_failure_lookback_days:
        description: "Janela de alerta para falhas de DR game day"
        required: false
        default: "14"
        type: string

env:
  BASE_URL: ${{ github.event.inputs.base_url || vars.BELAPOP_BASE_URL || 'https://belapopoficial.com.br' }}
  JOB_SECRET: ${{ secrets.INTERNAL_JOB_SECRET || secrets.CRON_JOB_SECRET }}
  OUTBOX_LIMIT: ${{ github.event.inputs.outbox_limit || '200' }}
  SLA_LIMIT: ${{ github.event.inputs.sla_limit || '250' }}
  REVERSE_LIMIT: ${{ github.event.inputs.reverse_limit || '300' }}
  SRE_LIMIT: ${{ github.event.inputs.sre_limit || '250' }}
  RANKING_LIMIT: ${{ github.event.inputs.ranking_limit || '200' }}
  RISK_LIMIT: ${{ github.event.inputs.risk_limit || '500' }}
  RECON_LIMIT: ${{ github.event.inputs.recon_limit || '200' }}
  RECON_DATE: ${{ github.event.inputs.recon_date || '' }}
  RECON_PROVIDER: ${{ github.event.inputs.recon_provider || '' }}
  RISK_WINDOW_DAYS: ${{ github.event.inputs.risk_window_days || '30' }}
  CRITICAL_DELTA_CENTS: ${{ github.event.inputs.critical_delta_cents || '10000' }}
  ONCALL_DAYS_AHEAD: ${{ github.event.inputs.oncall_days_ahead || '21' }}
  BUDGET_WINDOW_DAYS: ${{ github.event.inputs.budget_window_days || '30' }}
  DR_MONTHS_AHEAD: ${{ github.event.inputs.dr_months_ahead || '6' }}
  DR_DAY_OF_MONTH: ${{ github.event.inputs.dr_day_of_month || '10' }}
  DR_GRACE_DAYS: ${{ github.event.inputs.dr_grace_days || '3' }}
  INCIDENT_ACK_MINUTES: ${{ github.event.inputs.incident_ack_minutes || '10' }}
  ONCALL_COVERAGE_DAYS_AHEAD: ${{ github.event.inputs.oncall_coverage_days_ahead || '2' }}
  DR_REMINDER_DAYS_AHEAD: ${{ github.event.inputs.dr_reminder_days_ahead || '7' }}
  DR_FAILURE_LOOKBACK_DAYS: ${{ github.event.inputs.dr_failure_lookback_days || '14' }}

jobs:
  process_notification_outbox:
    if: github.event.schedule == '*/5 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger process-notification-outbox
        run: |
          if [ -z "$JOB_SECRET" ]; then
            echo "JOB_SECRET ausente. Configure INTERNAL_JOB_SECRET ou CRON_JOB_SECRET."
            exit 1
          fi
          curl --fail-with-body --show-error --silent \
            -X POST "$BASE_URL/api/internal/jobs/process-notification-outbox?limit=$OUTBOX_LIMIT" \
            -H "x-job-secret: $JOB_SECRET" \
            -H "Content-Type: application/json"

  support_sla_escalation:
    if: github.event.schedule == '*/15 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger support-sla-escalation
        run: |
          if [ -z "$JOB_SECRET" ]; then
            echo "JOB_SECRET ausente. Configure INTERNAL_JOB_SECRET ou CRON_JOB_SECRET."
            exit 1
          fi
          curl --fail-with-body --show-error --silent \
            -X POST "$BASE_URL/api/internal/jobs/support-sla-escalation?limit=$SLA_LIMIT" \
            -H "x-job-secret: $JOB_SECRET" \
            -H "Content-Type: application/json"

  process_reverse_logistics:
    if: github.event.schedule == '*/10 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger process-reverse-logistics
        run: |
          if [ -z "$JOB_SECRET" ]; then
            echo "JOB_SECRET ausente. Configure INTERNAL_JOB_SECRET ou CRON_JOB_SECRET."
            exit 1
          fi
          curl --fail-with-body --show-error --silent \
            -X POST "$BASE_URL/api/internal/jobs/process-reverse-logistics?limit=$REVERSE_LIMIT" \
            -H "x-job-secret: $JOB_SECRET" \
            -H "Content-Type: application/json"

  evaluate_sre:
    if: github.event.schedule == '*/5 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger evaluate-sre
        run: |
          if [ -z "$JOB_SECRET" ]; then
            echo "JOB_SECRET ausente. Configure INTERNAL_JOB_SECRET ou CRON_JOB_SECRET."
            exit 1
          fi
          curl --fail-with-body --show-error --silent \
            -X POST "$BASE_URL/api/internal/jobs/evaluate-sre?limit=$SRE_LIMIT&window_minutes=60&dr_max_age_days=30&incident_ack_minutes=$INCIDENT_ACK_MINUTES" \
            -H "x-job-secret: $JOB_SECRET" \
            -H "Content-Type: application/json"

  process_ranking_realtime:
    if: github.event.schedule == '*/2 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger process-ranking-realtime
        run: |
          if [ -z "$JOB_SECRET" ]; then
            echo "JOB_SECRET ausente. Configure INTERNAL_JOB_SECRET ou CRON_JOB_SECRET."
            exit 1
          fi
          curl --fail-with-body --show-error --silent \
            -X POST "$BASE_URL/api/internal/jobs/process-ranking-realtime?limit=$RANKING_LIMIT&attribution_days=14" \
            -H "x-job-secret: $JOB_SECRET" \
            -H "Content-Type: application/json"

  refresh_sre_foundations:
    if: github.event.schedule == '17 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger refresh-sre-foundations
        run: |
          if [ -z "$JOB_SECRET" ]; then
            echo "JOB_SECRET ausente. Configure INTERNAL_JOB_SECRET ou CRON_JOB_SECRET."
            exit 1
          fi

          QUERY="limit=$SRE_LIMIT&oncall_days_ahead=$ONCALL_DAYS_AHEAD&incident_ack_minutes=$INCIDENT_ACK_MINUTES&oncall_coverage_days_ahead=$ONCALL_COVERAGE_DAYS_AHEAD&budget_window_days=$BUDGET_WINDOW_DAYS&dr_months_ahead=$DR_MONTHS_AHEAD&dr_day_of_month=$DR_DAY_OF_MONTH&dr_grace_days=$DR_GRACE_DAYS&dr_reminder_days_ahead=$DR_REMINDER_DAYS_AHEAD&dr_failure_lookback_days=$DR_FAILURE_LOOKBACK_DAYS"
          curl --fail-with-body --show-error --silent \
            -X POST "$BASE_URL/api/internal/jobs/refresh-sre-foundations?$QUERY" \
            -H "x-job-secret: $JOB_SECRET" \
            -H "Content-Type: application/json"

  refresh_risk_holdbacks:
    if: github.event.schedule == '12 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger refresh-risk-holdbacks
        run: |
          if [ -z "$JOB_SECRET" ]; then
            echo "JOB_SECRET ausente. Configure INTERNAL_JOB_SECRET ou CRON_JOB_SECRET."
            exit 1
          fi
          curl --fail-with-body --show-error --silent \
            -X POST "$BASE_URL/api/internal/jobs/refresh-risk-holdbacks?limit=$RISK_LIMIT&min_score=55" \
            -H "x-job-secret: $JOB_SECRET" \
            -H "Content-Type: application/json"

  refresh_risk_recon_t1:
    if: github.event.schedule == '20 3 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger refresh-risk-recon-t1
        run: |
          if [ -z "$JOB_SECRET" ]; then
            echo "JOB_SECRET ausente. Configure INTERNAL_JOB_SECRET ou CRON_JOB_SECRET."
            exit 1
          fi

          QUERY="risk_limit=$RISK_LIMIT&recon_limit=$RECON_LIMIT&min_score=55&risk_window_days=$RISK_WINDOW_DAYS&critical_delta_cents=$CRITICAL_DELTA_CENTS"
          if [ -n "$RECON_DATE" ]; then
            QUERY="$QUERY&date=$RECON_DATE"
          fi
          if [ -n "$RECON_PROVIDER" ]; then
            QUERY="$QUERY&provider=$RECON_PROVIDER"
          fi

          curl --fail-with-body --show-error --silent \
            -X POST "$BASE_URL/api/internal/jobs/refresh-risk-recon-t1?$QUERY" \
            -H "x-job-secret: $JOB_SECRET" \
            -H "Content-Type: application/json"
